<form class="d-flex" #searchForm="ngForm" (ngSubmit)="onSubmit(searchForm)">
  <input
    name="search"
    ngModel
    class="form-control me-2"
    type="search"
    placeholder="Type country name"
    aria-label="Search"
  />
  <button class="btn btn-outline-light" type="submit">Search</button>
</form>
