<div class="row">
  <div class="col-12 mt-3">
    <h1>World countries</h1>
  </div>
  <div
    class="col-12"
    id="countries__wrapper">
    <ul class="list-group list-group-flush">
      @for (country of countries() | search: query(); track country.name.common) {
        <li class="list-group-item d-flex justify-content-between align-items-start">
          <a
            class="ms-2 me-auto"
            [routerLink]="'/country/' + country.name.common"
            >{{ country.name.common }}</a
          >
          <span class="badge text-bg-light rounded-pill">{{ country.region }}</span>
        </li>
      }
    </ul>
  </div>
</div>
